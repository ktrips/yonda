# ============================================================
# yonda → Google Cloud Run デプロイ（deploy.sh と同等）
#   ホスト名: yonda.ktrips.net
#
# 必要な GitHub Secrets:
#   - GCP_PROJECT_ID: GCP プロジェクト ID
#   - GCP_SA_KEY: サービスアカウントキー（JSON、base64 不要）
#   - AUTH_JP_JSON: auth_jp.json の内容（Audible 認証）
#   - CREDENTIALS_JSON: .credentials.json の内容（図書館認証、任意）
# ============================================================
name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_only:
        description: 'イメージ更新のみ（バケット・シークレットはスキップ）'
        required: false
        default: false
        type: boolean

env:
  REGION: asia-northeast1
  SERVICE_NAME: yonda
  DOMAIN: yonda.ktrips.net
  REPO_NAME: yonda-repo
  BUCKET_NAME: ${{ secrets.GCP_PROJECT_ID }}-yonda-data
  DATA_MOUNT: /mnt/data
  SECRETS_MOUNT: /secrets

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set image tag
        id: image
        run: |
          IMAGE_TAG="${REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPO_NAME}/${SERVICE_NAME}:latest"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
        env:
          REGION: ${{ env.REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REPO_NAME: ${{ env.REPO_NAME }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}

      - name: Enable APIs
        if: ${{ inputs.image_only != 'true' }}
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            secretmanager.googleapis.com \
            storage.googleapis.com \
            --quiet

      - name: Create Artifact Registry repository
        if: ${{ inputs.image_only != 'true' }}
        run: |
          if ! gcloud artifacts repositories describe "${REPO_NAME}" \
            --location="${REGION}" --format='value(name)' 2>/dev/null; then
            gcloud artifacts repositories create "${REPO_NAME}" \
              --repository-format=docker \
              --location="${REGION}" \
              --description="yonda container images"
          fi
        env:
          REPO_NAME: ${{ env.REPO_NAME }}
          REGION: ${{ env.REGION }}

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag "${IMAGE_TAG}" \
            --timeout=600 \
            .
        env:
          IMAGE_TAG: ${{ steps.image.outputs.IMAGE_TAG }}

      - name: Image-only deploy
        if: ${{ inputs.image_only == 'true' }}
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_TAG}" \
            --region "${REGION}" \
            --quiet
          echo "✔ イメージ更新のみデプロイ完了"
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          IMAGE_TAG: ${{ steps.image.outputs.IMAGE_TAG }}
          REGION: ${{ env.REGION }}

      - name: Create GCS bucket
        if: ${{ inputs.image_only != 'true' }}
        run: |
          if ! gsutil ls -b "gs://${BUCKET_NAME}" 2>/dev/null; then
            gsutil mb -l "${REGION}" "gs://${BUCKET_NAME}"
          fi
        env:
          BUCKET_NAME: ${{ env.BUCKET_NAME }}
          REGION: ${{ env.REGION }}

      - name: Upload data files to GCS
        if: ${{ inputs.image_only != 'true' }}
        run: |
          for f in library_books.json audible_books.json kindle_books.json .credentials.json; do
            if [[ -f "data/${f}" ]]; then
              gsutil -q cp "data/${f}" "gs://${BUCKET_NAME}/${f}"
              echo "    ✔ ${f}"
            fi
          done
        env:
          BUCKET_NAME: ${{ env.BUCKET_NAME }}

      - name: Create/update Secret Manager secrets
        if: ${{ inputs.image_only != 'true' }}
        run: |
          create_or_update_secret() {
            local name="$1" content="$2"
            if [[ -z "$content" ]]; then return; fi
            if ! gcloud secrets describe "${name}" --format='value(name)' 2>/dev/null; then
              gcloud secrets create "${name}" --replication-policy="automatic"
            fi
            echo "$content" | gcloud secrets versions add "${name}" --data-file=- --quiet
            echo "    ✔ ${name}"
          }
          if [[ -n "$AUTH_JP" ]]; then
            create_or_update_secret "yonda-auth-jp" "$AUTH_JP"
          else
            echo "    ⚠ AUTH_JP_JSON が未設定（Audible 機能には必要）"
          fi
          if [[ -n "$CREDENTIALS" ]]; then
            create_or_update_secret "yonda-credentials" "$CREDENTIALS"
            echo "$CREDENTIALS" | gsutil -q cp - "gs://${BUCKET_NAME}/.credentials.json"
            echo "    ✔ .credentials.json → GCS"
          else
            echo "    ⚠ CREDENTIALS_JSON が未設定（図書館ログインには必要）"
          fi
        env:
          AUTH_JP: ${{ secrets.AUTH_JP_JSON }}
          CREDENTIALS: ${{ secrets.CREDENTIALS_JSON }}
          BUCKET_NAME: ${{ env.BUCKET_NAME }}

      - name: IAM policy binding
        if: ${{ inputs.image_only != 'true' }}
        run: |
          PROJECT_NUMBER=$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)' 2>/dev/null)
          RUN_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          for role in roles/storage.objectAdmin roles/secretmanager.secretAccessor; do
            gcloud projects add-iam-policy-binding "${PROJECT_ID}" \
              --member="serviceAccount:${RUN_SA}" \
              --role="${role}" \
              --quiet 2>/dev/null || true
          done
          for secret_name in yonda-auth-jp yondapp-auth-jp yonda-credentials; do
            if gcloud secrets describe "${secret_name}" --format='value(name)' 2>/dev/null; then
              gcloud secrets add-iam-policy-binding "${secret_name}" \
                --member="serviceAccount:${RUN_SA}" \
                --role="roles/secretmanager.secretAccessor" \
                --quiet 2>/dev/null || true
              echo "    ✔ ${secret_name} → ${RUN_SA}"
            fi
          done
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        if: ${{ inputs.image_only != 'true' }}
        run: |
          AUTH_SECRET="yonda-auth-jp"
          if gcloud secrets describe "yondapp-auth-jp" 2>/dev/null; then
            AUTH_SECRET="yondapp-auth-jp"
          fi
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_TAG}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --execution-environment gen2 \
            --add-volume "name=data-vol,type=cloud-storage,bucket=${BUCKET_NAME}" \
            --add-volume-mount "volume=data-vol,mount-path=${DATA_MOUNT}" \
            --set-secrets "${SECRETS_MOUNT}/auth_jp.json=${AUTH_SECRET}:latest" \
            --update-env-vars "\
          YONDA_DATA_DIR=${DATA_MOUNT},\
          YONDA_AUTH_FILE=${SECRETS_MOUNT}/auth_jp.json,\
          YONDA_CREDS_PATH=${DATA_MOUNT}/.credentials.json" \
            --quiet
          SERVICE_URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --region="${REGION}" --format='value(status.url)')
          echo "✔ Cloud Run デプロイ完了: ${SERVICE_URL}"
        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          IMAGE_TAG: ${{ steps.image.outputs.IMAGE_TAG }}
          REGION: ${{ env.REGION }}
          BUCKET_NAME: ${{ env.BUCKET_NAME }}
          DATA_MOUNT: ${{ env.DATA_MOUNT }}
          SECRETS_MOUNT: ${{ env.SECRETS_MOUNT }}

      - name: Custom domain mapping
        if: ${{ inputs.image_only != 'true' }}
        run: |
          if ! gcloud run domain-mappings describe \
            --domain="${DOMAIN}" --region="${REGION}" 2>/dev/null; then
            gcloud run domain-mappings create \
              --service="${SERVICE_NAME}" \
              --domain="${DOMAIN}" \
              --region="${REGION}" \
              --quiet || true
          fi
          echo "✔ カスタムドメイン: https://${DOMAIN}"
        env:
          DOMAIN: ${{ env.DOMAIN }}
          REGION: ${{ env.REGION }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
