# yonda → Google Cloud Run デプロイ
# トリガー: main への push / 手動実行
# 必要な Secrets: GCP_PROJECT_ID, GCP_SA_KEY, AUTH_JP_JSON, (CREDENTIALS_JSON)

name: Deploy yonda to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_only:
        description: 'イメージ更新のみ（deploy.sh --image-only 相当）'
        required: false
        default: false
        type: boolean
      scheduler_only:
        description: 'Cloud Schedulerのみ更新（ヘッダー修正などに）'
        required: false
        default: false
        type: boolean

env:
  REGION: asia-northeast1
  SERVICE_NAME: yonda
  REPO_NAME: yonda-repo
  BUCKET_NAME_PREFIX: yonda-data
  DOMAIN: yonda.ktrips.net

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gcloud and authenticate
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # gcloud が未インストールならインストール（ubuntu runner には入っている場合あり）
          if ! command -v gcloud &>/dev/null; then
            curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts --install-dir="$HOME"
            echo "$HOME/google-cloud-sdk/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/google-cloud-sdk/bin:$PATH"
          fi
          # 認証ファイル作成
          python3 -c "
          import os, json
          key = os.environ.get('GCP_SA_KEY', '')
          if not key.strip():
              raise SystemExit('GCP_SA_KEY is empty. Add the service account JSON to GitHub Secrets.')
          try:
              json.loads(key)
          except json.JSONDecodeError as e:
              raise SystemExit(f'GCP_SA_KEY is invalid JSON: {e}. Ensure the full JSON is copied (from { to }).')
          with open('gcp-key.json', 'w') as f:
              f.write(key)
          print('Credentials file created')
          "
          gcloud auth activate-service-account --key-file=gcp-key.json
          gcloud config set project "$GCP_PROJECT_ID"
          rm -f gcp-key.json

      - name: Prepare auth files for full deploy
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        env:
          AUTH_JP_JSON: ${{ secrets.AUTH_JP_JSON }}
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          mkdir -p data
          python3 -c "
          import os
          for name, path in [('AUTH_JP_JSON', 'auth_jp.json'), ('CREDENTIALS_JSON', 'data/.credentials.json')]:
              val = os.environ.get(name, '')
              if val:
                  with open(path, 'w') as f:
                      f.write(val)
                  print(f'  ✔ {path} created')
          "

      - name: Enable APIs
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            cloudbuild.googleapis.com \
            secretmanager.googleapis.com \
            storage.googleapis.com \
            cloudscheduler.googleapis.com \
            --quiet

      - name: Create Artifact Registry repository
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          if ! gcloud artifacts repositories describe ${{ env.REPO_NAME }} \
               --location=${{ env.REGION }} --format='value(name)' 2>/dev/null; then
            gcloud artifacts repositories create ${{ env.REPO_NAME }} \
              --repository-format=docker \
              --location=${{ env.REGION }} \
              --description="yonda container images"
          fi
          # デプロイ用SAにCloudBuild閲覧権限を付与（ビルドステータスポーリング用）
          DEPLOY_SA=$(gcloud config get-value account 2>/dev/null)
          if [[ -n "${DEPLOY_SA}" ]]; then
            gcloud projects add-iam-policy-binding ${{ secrets.GCP_PROJECT_ID }} \
              --member="serviceAccount:${DEPLOY_SA}" \
              --role="roles/cloudbuild.builds.viewer" \
              --quiet 2>/dev/null || true
            echo "  ✔ cloudbuild.builds.viewer 付与: ${DEPLOY_SA}"
          fi

      - name: Build and push Docker image
        if: ${{ github.event.inputs.scheduler_only != 'true' }}
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          # --async で送信 → URL からビルドIDを確実に取得 → ポーリング
          SUBMIT_OUT=$(gcloud builds submit --async --tag "${IMAGE_TAG}" --timeout=900 . 2>&1)
          echo "${SUBMIT_OUT}"
          # Created [.../builds/UUID] の形式から UUID を取得
          BUILD_ID=$(echo "${SUBMIT_OUT}" | grep -oP '/builds/\K[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if [[ -z "${BUILD_ID}" ]]; then
            echo "ERROR: ビルドIDを取得できませんでした。出力:"
            echo "${SUBMIT_OUT}"
            exit 1
          fi
          echo "Build ID: ${BUILD_ID}"
          # ビルド完了までポーリング（最大30分）
          for i in $(seq 1 120); do
            STATUS=$(gcloud builds describe "${BUILD_ID}" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
            echo "  [${i}/120] ${STATUS}"
            case "$STATUS" in
              SUCCESS) echo "✔ Build ${BUILD_ID} succeeded (version: ${SHORT_SHA})"; break ;;
              FAILURE|CANCELLED|EXPIRED|TIMEOUT)
                echo "✘ Build failed: ${STATUS}"
                exit 1 ;;
              *) sleep 15 ;;
            esac
          done
          if [[ "${STATUS}" != "SUCCESS" ]]; then
            echo "✘ Build timed out (status: ${STATUS})"
            exit 1
          fi

      - name: Deploy (image only)
        if: ${{ github.event.inputs.image_only == 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE_TAG}" \
            --region ${{ env.REGION }} \
            --update-env-vars "APP_VERSION=${{ github.sha }}" \
            --quiet
          echo "✔ イメージ更新デプロイ完了"

      - name: Create GCS bucket (データアップロードはスキップ)
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          BUCKET_NAME="${{ secrets.GCP_PROJECT_ID }}-${{ env.BUCKET_NAME_PREFIX }}"
          if ! gsutil ls -b "gs://${BUCKET_NAME}" 2>/dev/null; then
            gsutil mb -l ${{ env.REGION }} "gs://${BUCKET_NAME}"
            echo "  ✔ GCS バケット作成"
          fi
          echo ">>> ローカルデータのアップロードはスキップ（クラウド側で定期取得）"
          # ローカルの古いデータをアップロードしない
          # データはCloud Scheduler経由で自動取得される
          if [[ -f "data/.credentials.json" ]]; then
            if ! gsutil -q stat "gs://${BUCKET_NAME}/.credentials.json" 2>/dev/null; then
              gsutil -q cp "data/.credentials.json" "gs://${BUCKET_NAME}/.credentials.json"
              echo "  ✔ .credentials.json"
            fi
          fi

      - name: Create or update secrets
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          # 最新バージョン以外を削除してアクティブバージョン数を1に保つヘルパー
          prune_old_versions() {
            local secret_name="$1"
            gcloud secrets versions list "${secret_name}" \
              --filter="state=ENABLED" \
              --format="value(name)" \
              --sort-by="~createTime" \
              | tail -n +2 \
              | xargs -r -I{} gcloud secrets versions destroy "{}" --secret="${secret_name}" --quiet
          }

          if [[ -f "auth_jp.json" ]]; then
            if ! gcloud secrets describe yonda-auth-jp --format='value(name)' 2>/dev/null; then
              gcloud secrets create yonda-auth-jp --replication-policy="automatic"
            fi
            gcloud secrets versions add yonda-auth-jp --data-file=auth_jp.json --quiet
            prune_old_versions yonda-auth-jp
            echo "  ✔ yonda-auth-jp"
          else
            echo "  ⚠ auth_jp.json がありません（AUTH_JP_JSON を GitHub Secrets に登録してください）"
          fi
          if [[ -f "data/.credentials.json" ]]; then
            if ! gcloud secrets describe yonda-credentials --format='value(name)' 2>/dev/null; then
              gcloud secrets create yonda-credentials --replication-policy="automatic"
            fi
            gcloud secrets versions add yonda-credentials --data-file=data/.credentials.json --quiet
            prune_old_versions yonda-credentials
            echo "  ✔ yonda-credentials"
          fi

      - name: Grant IAM to Cloud Run service account
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ secrets.GCP_PROJECT_ID }} --format='value(projectNumber)')
          RUN_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          for role in roles/storage.objectAdmin roles/secretmanager.secretAccessor; do
            gcloud projects add-iam-policy-binding ${{ secrets.GCP_PROJECT_ID }} \
              --member="serviceAccount:${RUN_SA}" \
              --role="${role}" \
              --quiet 2>/dev/null || true
          done
          for secret_name in yonda-auth-jp yondapp-auth-jp yonda-credentials yonda-internal-token; do
            if gcloud secrets describe "${secret_name}" --format='value(name)' 2>/dev/null; then
              gcloud secrets add-iam-policy-binding "${secret_name}" \
                --member="serviceAccount:${RUN_SA}" \
                --role="roles/secretmanager.secretAccessor" \
                --quiet 2>/dev/null || true
            fi
          done

      - name: Deploy to Cloud Run (full)
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest"
          BUCKET_NAME="${{ secrets.GCP_PROJECT_ID }}-${{ env.BUCKET_NAME_PREFIX }}"
          AUTH_SECRET="yonda-auth-jp"
          if gcloud secrets describe "yondapp-auth-jp" 2>/dev/null; then
            AUTH_SECRET="yondapp-auth-jp"
          fi

          echo "=== 診断情報 ==="
          echo "gcloud version: $(gcloud version --format='value(Google Cloud SDK)' 2>/dev/null || gcloud version 2>&1 | head -1)"
          echo "AUTH_SECRET: ${AUTH_SECRET}"
          echo "IMAGE_TAG: ${IMAGE_TAG}"
          echo "BUCKET_NAME: ${BUCKET_NAME}"
          echo "==============="

          DEPLOY_LOG=$(gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE_TAG}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 1800 \
            --execution-environment gen2 \
            --add-volume "name=data-vol,type=cloud-storage,bucket=${BUCKET_NAME}" \
            --add-volume-mount "volume=data-vol,mount-path=/mnt/data" \
            --set-secrets "/secrets/auth_jp.json=${AUTH_SECRET}:latest,YONDA_INTERNAL_TOKEN=yonda-internal-token:latest" \
            --update-env-vars "YONDA_DATA_DIR=/mnt/data,YONDA_AUTH_FILE=/secrets/auth_jp.json,YONDA_CREDS_PATH=/mnt/data/.credentials.json,YONDA_KINDLE_SESSION_PATH=/mnt/data/kindle_session.json,YONDA_AI_CONFIG_PATH=/mnt/data/ai_config.json,APP_VERSION=${{ github.sha }}" \
            2>&1) && DEPLOY_OK=true || DEPLOY_OK=false

          echo "${DEPLOY_LOG}"

          if [[ "${DEPLOY_OK}" == "false" ]]; then
            echo "::error::フルデプロイ失敗。エラー詳細:"
            echo "::error::${DEPLOY_LOG}"
            echo ""
            echo "--- フォールバック: image_only デプロイを試みます ---"
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image "${IMAGE_TAG}" \
              --region ${{ env.REGION }} \
              --update-env-vars "APP_VERSION=${{ github.sha }}" \
              --quiet
            echo "⚠ image_only フォールバックデプロイ完了（設定変更は未適用）"
          else
            echo "✔ Cloud Run フルデプロイ完了"
          fi

      - name: Map custom domain
        if: ${{ github.event.inputs.image_only != 'true' && github.event.inputs.scheduler_only != 'true' }}
        run: |
          if ! gcloud run domain-mappings describe \
               --domain=${{ env.DOMAIN }} --region=${{ env.REGION }} 2>/dev/null; then
            gcloud run domain-mappings create \
              --service=${{ env.SERVICE_NAME }} \
              --domain=${{ env.DOMAIN }} \
              --region=${{ env.REGION }} \
              --quiet || true
          fi

      - name: Setup Cloud Scheduler (fetch 6/12/18/21 JST)
        if: ${{ github.event.inputs.image_only != 'true' || github.event.inputs.scheduler_only == 'true' }}
        # scheduler_only=true の場合は SERVICE_URL を再取得する必要あり
        # NOTE: `gcloud scheduler jobs update http` は --headers をサポートしないため
        #       削除→再作成方式で常に最新設定を適用する
        run: |
          SERVICE_URL="$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')"
          FETCH_URL="${SERVICE_URL}/api/internal/auto-fetch-all"
          FETCH_BODY='{}'
          LOCATION="${{ env.REGION }}"
          # YONDA_INTERNAL_TOKEN が設定済みの場合はヘッダーに追加
          TOKEN_HEADER="Content-Type=application/json,X-CloudScheduler=true"
          if [[ -n "${{ secrets.YONDA_INTERNAL_TOKEN }}" ]]; then
            TOKEN_HEADER="${TOKEN_HEADER},X-Internal-Token=${{ secrets.YONDA_INTERNAL_TOKEN }}"
          fi
          # 削除→再作成で確実に最新設定を適用
          setup_job() {
            local name="$1" schedule="$2" uri="$3" body="$4" hdrs="$5"
            gcloud scheduler jobs delete "${name}" --location="${LOCATION}" --quiet 2>/dev/null || true
            gcloud scheduler jobs create http "${name}" \
              --location="${LOCATION}" \
              --schedule="${schedule}" \
              --uri="${uri}" \
              --message-body="${body}" \
              --headers="${hdrs}" \
              --time-zone="Asia/Tokyo" \
              --attempt-deadline=1800s \
              --quiet \
            && echo "  ✔ ${name} (${schedule})" || echo "  ⚠ ${name} 作成スキップ（権限不足）"
          }
          setup_job "yonda-fetch-morning" "0 6 * * *"  "${FETCH_URL}" "${FETCH_BODY}" "${TOKEN_HEADER}"
          setup_job "yonda-fetch-noon"    "0 12 * * *" "${FETCH_URL}" "${FETCH_BODY}" "${TOKEN_HEADER}"
          setup_job "yonda-fetch-evening" "0 18 * * *" "${FETCH_URL}" "${FETCH_BODY}" "${TOKEN_HEADER}"
          setup_job "yonda-fetch-night"   "0 21 * * *" "${FETCH_URL}" "${FETCH_BODY}" "${TOKEN_HEADER}"

          # 週次エンリッチジョブ（insights一括補完 / 日曜 03:00 JST）
          ENRICH_URL="${SERVICE_URL}/api/enrich"
          setup_job "yonda-enrich-weekly" "0 3 * * 0" "${ENRICH_URL}" '{"max_books":50}' "Content-Type=application/json"

          echo "  ℹ Cloud Scheduler の権限が不足している場合はローカルで手動設定してください"
